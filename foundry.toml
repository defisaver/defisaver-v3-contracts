[profile.default]
src = 'contracts'
out = 'artifacts'
test = 'test-sol'
libs = ['node_modules', 'lib']
solc = '0.8.24'
optimizer = true
evm_version = 'cancun'
optimizer_runs = 10000
gas_reports = ['*']
remappings = [
    'hardhat/=node_modules/hardhat/',
    'ds-test/=lib/ds-test/src/',
    'forge-std/=lib/forge-std/src/',
]
fs_permissions = [{ access = 'read', path = './test-sol/config/' }]


[profile.arbitrum]
# TODO -> Check fluid tests, 
# Remove strategies/automations from here
no_match_path = "test-sol/{actions,views,triggers,strategies}/*{eulerV2,etherFi,gho,liquityV2,pendle,renzo,sky,Sky,Spark,summerfi,Curve,Automation,aaveV3/umbrella,fluid,AaveView}*"

[profile.base]
no_match_path = "test-sol/{actions,views,triggers,strategies}/*{eulerV2,etherFi,gho,liquityV2,pendle,renzo,sky,Sky,Spark,summerfi,Curve,Automation,aaveV3/umbrella,fluid,AaveView}*"

[profile.optimism]
no_match_path = "test-sol/{actions,views,triggers,strategies}/*{eulerV2,etherFi,gho,liquityV2,pendle,renzo,sky,Sky,Spark,summerfi,Curve,Automation,aaveV3/umbrella,fluid,AaveView}*"

[profile.linea]
no_match_path = "test-sol/{actions,views,triggers,strategies}/*{eulerV2,etherFi,gho,liquityV2,pendle,renzo,sky,Sky,Spark,summerfi,Curve,Automation,aaveV3/umbrella,fluid,AaveView}*"
evm_version = "london"

[profile.plasma]
no_match_path = "test-sol/{actions,views,triggers,strategies}/*{eulerV2,etherFi,gho,liquityV2,pendle,renzo,sky,Sky,Spark,summerfi,Curve,Automation,aaveV3/umbrella,fluid,AaveView}*"


# Formatting -> https://getfoundry.sh/config/reference/formatter/
# https://github.com/foundry-rs/foundry/blob/master/crates/fmt/README.md#configuration
[fmt]
bracket_spacing = true
number_underscore = "thousands"
ignore = ["deprecated/**"]
line_length = 100
# int_types = "long"
# tab_width = 4


# Linting -> https://getfoundry.sh/config/reference/linter
[lint]
exclude_lints = [
    # "unaliased-plain-import",
    # "unused-import",
    # "incorrect-shift",
    # "unchecked-call",
    # "unsafe-cheatcode",
    # "erc20-unchecked-transfer",
    # "divide-before-multiply",
    # "unsafe-typecast", # ! commented out because currently on older foundry version 
    # "named-struct-fields",
    # "unwrapped-modifier-logic",
    "asm-keccak256",

    "mixed-case-function",
    "mixed-case-variable",
    "screaming-snake-case-const",
    "screaming-snake-case-immutable",
    "pascal-case-struct",
]
ignore = ["deprecated/**", "test-sol/**"]
lint_on_build = false

# https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
